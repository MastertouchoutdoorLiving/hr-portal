<style>

body{font-family:system-ui,-apple-system,sans-serif;background:#f8fafc}
.sidebar{width:240px;background:#1e293b;color:white;height:100vh;position:fixed;overflow-y:auto;transition:transform .3s}
.main{margin-left:240px;padding:24px;min-height:100vh}
.card{background:white;border-radius:8px;border:1px solid #e2e8f0;padding:16px;margin-bottom:16px}
.btn{padding:8px 16px;border-radius:6px;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all .2s}

.btn-danger{background:#ef4444;color:white}.btn-danger:hover{background:#dc2626}

.sidebar-item{padding:10px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;border-radius:6px;margin:2px 8px;font-size:14px;transition:all .2s}
.sidebar-item:hover,.sidebar-item.active{background:rgba(255,255,255,.1)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}

.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}
.justify-between{justify-content:space-between}.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}
.mb-4{margin-bottom:16px}.mb-2{margin-bottom:8px}.mt-2{margin-top:8px}.mt-4{margin-top:16px}
.text-sm{font-size:14px}.text-xs{font-size:12px}.text-lg{font-size:18px}.text-xl{font-size:20px}.text-2xl{font-size:24px}
.font-bold{font-weight:700}.font-medium{font-weight:500}.text-gray{color:#64748b}
.w-full{width:100%}.p-4{padding:16px}.rounded{border-radius:8px}
.search-box{position:relative}.search-box input{padding-left:36px}

.tab.active{color:#3b82f6;border-bottom-color:#3b82f6}
.progress-bar{height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:#3b82f6;border-radius:4px;transition:width .3s}

<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useCallback,useRef}=React;
const LS=(k,d)=>{try{const v=localStorage.getItem('mtp_'+k);return v?JSON.parse(v):d}catch{return d}};
const SS=(k,v)=>{try{localStorage.setItem('mtp_'+k,JSON.stringify(v))}catch{}};
const useLS=(k,d)=>{
const[v,setV]=useState(()=>LS(k,d));
const skip=useRef(false);
useEffect(()=>{
const ref=fbDB.ref('hr/'+k);
ref.on('value',snap=>{const data=snap.val();if(data!==null&&data!==undefined){skip.current=true;setV(data);SS(k,data)}});
return()=>ref.off();
},[k]);
useEffect(()=>{if(skip.current){skip.current=false;return}SS(k,v);fbDB.ref('hr/'+k).set(v).catch(()=>{})},[k,v]);
return[v,setV];
};
const ID=()=>'_'+Math.random().toString(36).substr(2,9);
const FD=(d)=>d?new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'';
const NOW=()=>new Date().toISOString().split('T')[0];
const log=(logs,setLogs,action,details)=>{const l=[{id:ID(),action,details,timestamp:new Date().toISOString(),user:'Admin'},...logs];setLogs(l.slice(0,200))};

function Modal({open,onClose,title,children}){
if(!open)return null;
return(<div className="modal-overlay" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}>
<div className="flex justify-between items-center mb-4"><h2 className="text-xl font-bold">{title}</h2>
<button className="btn btn-outline" onClick={onClose}>â</button></div>{children}</div></div>);
}

function PhotoUpload({value,onChange}){
const handleFile=(e)=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=(ev)=>onChange(ev.target.result);r.readAsDataURL(f)};
return(<div className="flex items-center gap-3">
{value?<div className="avatar"><img src={value}/></div>:<div className="avatar">?</div>}
<input type="file" accept="image/*" onChange={handleFile} style={{fontSize:'12px'}}/>
</div>);
}

const PAGES=['Dashboard','Employees','Clients','Complaints','Payroll','Job Positions','Applicants','Tasks','Inventory','Messages','Birthdays','Audit Log','Analytics'];
const ICONS=['ð','ð¥','ð¢','ð!,'ð°','ð¼','ð','â','ð¦','ð¬','ð','ð','ð'];

function App(){
const[page,setPage]=useState('Dashboard');
const[emps,setEmps]=useLS('emps',[]);
const[clients,setCli]=useLS('clients',[]);
const[complaints,setComp]=useLS('complaints',[]);
const[payroll,setPay]=useLS('payroll',[]);
const[positions,setPos]=useLS('positions',[]);
const[applicants,setApp]=useLS('applicants',[]);
const[tasks,setTasks]=useLS('tasks',[]);
const[inventory,setInv]=useLS('inventory',[]);
const[messages,setMsg]=useLS('messages',[]);
const[logs,setLogs]=useLS('logs',[]);
const L=(a,d)=>log(logs,setLogs,a,d);

return(<div className="flex">
<div className="sidebar">
<div style={{padding:'20px 16px',borderBottom:'1px solid rgba(255,255,255,.1)'}}>
<h1 className="text-lg font-bold">Master Touch</h1>
<p className="text-xs" style={{color:'#94a3b8'}}>HR Portal</p>
</div>
{PAGES.map((p,i)=>(
<div key={p} className={`sidebar-item${page===p?' active':''}`} onClick={()=>setPage(p)}>
<span>{ICONS[i]}</span><span>{p}</span>
</div>
))}
</div>
<div className="main">
<div className="flex justify-between items-center mb-4">
<h1 className="text-2xl font-bold">{page}</h1>
<span className="text-sm text-gray">{new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</span>
</div>
{page==='Dashboard'&&<Dashboard emps={emps} clients={clients} complaints={complaints} tasks={tasks} payroll={payroll}/>}
{page==='Employees'&&<Employees data={emps} set={setEmps} L={L}/>}
{page==='Clients'&&<Clients data={clients} set={setCli} L={L}/>}
{page==='Complaints'&&<Complaints data={complaints} set={setComp} emps={emps} L={L}/>}
{page==='Payroll'&&<Payroll data={payroll} set={setPay} emps={emps} L={L}/>}
{page==='Job Positions'&&<Positions data={positions} set={setPos} L={L}/>}
{page==='Applicants'&&<Applicants data={applicants} set={setApp} positions={positions} L={L}/>}
{page==='Tasks'&&<Tasks data={tasks} set={setTasks} emps={emps} L={L}/>}
{page==='Inventory'&&<Inventory data={inventory} set={setInv} L={L}/>}
{page==='Messages'&&<Messages data={messages} set={setMsg} emps={emps}/>}
{page==='Birthdays'&&<Birthdays emps={emps}/>}
{page==='Audit Log'&&<AuditLog data={logs}/>}
{page==='Analytics'&&<Analytics emps={emps} clients={clients} complaints={complaints} payroll={payroll} tasks={tasks}/>}
</div>
</div>);
}

function Dashboard({emps,clients,complaints,tasks,payroll}){
const active=complaints.filter(c=>c.status!=='Resolved').length;
const pending=tasks.filter(t=>t.status!=='Done').length;
const totalPay=payroll.reduce((s,p)=>s+(p.amount||0),0);
return(<div>
<div className="grid-4 mb-4">
<div className="stat"><h3>Total Employees</h3><p>{emps.length}</p></div>
<div className="stat"><h3>Active Clients</h3><p>{clients.length}</p></div>
<div className="stat"><h3>Open Complaints</h3><p style={{color:active>0?'#ef4444':'#22c55e'}}>{active}</p></div>
<div className="stat"><h3>Pending Tasks</h3><p style={{color:pending>0?'#f59e0b':'#22c55e'}}>{pending}</p></div>
</div>
<div className="grid-2">
<div className="card"><h3 className="font-bold mb-2">Recent Employees</h3>
{emps.slice(-5).reverse().map(e=>(<div key={e.id} className="flex items-center gap-2 mb-2">
<div className="avatar">{e.photo?<img src={e.photo}/>:e.name?.[0]||'?'}</div>
<div><div className="font-medium text-sm">{e.name}</div><div className="text-xs text-gray">{e.position||'N/A'}</div></div>
</div>))}
{!emps.length&&<p className="text-sm text-gray">No employees yet</p>}
</div>
<div className="card"><h3 className="font-bold mb-2">Recent Tasks</h3>
{tasks.slice(-5).reverse().map(t=>(<div key={t.id} className="flex justify-between items-center mb-2">
<span className="text-sm">{t.title}</span>
<span className={`badge ${t.status==='Done'?'badge-green':t.status==='In Progress'?'badge-blue':'badge-yellow'}`}>{t.status}</span>
</div>))}
{!tasks.length&&<p className="text-sm text-gray">No tasks yet</p>}
</div>
</div>
</div>);
}

function Employees({data,set,L}){
const[show,setShow]=useState(false);
const[edit,setEdit]=useState(null);
const[search,setSearch]=useState('');
const blank={name:'',email:'',phone:'',position:'',department:'',startDate:NOW(),status:'Active',salary:'',photo:''};
const[form,setForm]=useState(blank);
const filtered=data.filter(e=>(e.name||'').toLowerCase().includes(search.toLowerCase()));
const save=()=>{if(!form.name)return;
if(edit){set(data.map(e=>e.id===edit?{...form,id:edit}:e));L('Updated Employee',form.name)}
else{const n={...form,id:ID()};set([...data,n]);L('Added Employee',form.name)}
setShow(false);setEdit(null);setForm(blank)};
const del=(id,name)=>{set(data.filter(e=>e.id!==id));L('Deleted Employee',name)};
const openEdit=(e)=>{setForm(e);setEdit(e.id);setShow(true)};
return(<div>
<div className="flex justify-between items-center mb-4">
<input placeholder="Search employees..." value={search} onChange={e=>setSearch(e.target.value)} style={{maxWidth:300}}/>
<button className="btn btn-primary" onClick={()=>{setForm(blank);setEdit(null);setShow(true)}}>+ Add Employee</button>
</div>
<div className="card" style={{overflow:'auto'}}>
<table><thead><tr><th>Employee</th><th>Position</th><th>Department</th><th>Status</th><th>Start Date</th><th>Actions</th></tr></thead>
<tbody>{filtered.map(e=>(<tr key={e.id}>
<td><div className="flex items-center gap-2">
<div className="avatar">{e.photo?<img src={e.photo}/>:(e.name||'?')[0]}</div>
<div><div className="font-medium">{e.name}</div><div className="text-xs text-gray">{e.email}</div></div>
</div></td>
<td>{e.position||'-'}</td><td>{e.department||'-'}</td>
<td><span className={`badge ${e.status==='Active'?'badge-green':'badge-red'}`}>{e.status||'Active'}</span></td>
<td className="text-sm">{FD(e.startDate)}</td>
<td><div className="flex gap-2"><button className="btn btn-outline" onClick={()=>openEdit(e)}>Edit</button>
<button className="btn btn-danger" onClick={()=>del(e.id,e.name)}>Del</button></div></td>
</tr>))}</tbody></table>
{!filtered.length&&<p className="text-sm text-gray p-4">No employees found</p>}
</div>
<Modal open={show} onClose={()=>{setShow(false);setEdit(null)}} title={edit?'Edit Employee':'Add Employee'}>
<div className="flex-col gap-3">
<PhotoUpload value={form.photo} onChange={v=>setForm({...form,photo:v})}/>
<div className="grid-2 mt-2">
<div><label className="text-xs font-medium text-gray">Name*</label><input value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/></div>
<div><label className="text-xs font-medium text-gray">Email</label><input value={form.email} onChange={e=>setForm({...form,email:e.target.value})}/></div>
<div><label className="text-xs font-medium text-gray">Phone</label><input value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})}/></div>
<div><label className="text-xs font-medium text-gray">Position</label><input value={form.position} onChange={e=>setForm({...form,position:e.target.value})}/></div>
<div><label className="text-xs font-medium text-gray">Department</label><input value={form.department} onChange={e=>setForm({...form,department:e.target.value})}/></div>
<div><label className="text-xs font-medium text-gray">Start Date</label><input type="date" value={form.startDate} onChange={e=>setForm({...form,startDate:e.target.value})}/></div>
<div><label className="text-xs font-medium text-gray">Salary</label><input type="number" value={form.salary} onChange={e=>setForm({...form,salary:e.target.value})}/></div>
<div><label className="text-xs font-medium text-gray">Status</label><select value={form.status} onChange={e=>setForm({...form,status:e.target.value})}><option>Active</option><option>Inactive</option><option>On Leave</option></select></div>
</div>
<div className="flex justify-between mt-4"><button className="btn btn-outline" onClick={()=>{setShow(false);setEdit(null)}}>Cancel</button>
<button className="btn btn-primary" onClick={save}>{edit?'Update':'Add'} Employee</button></div>
</div>
</Modal>
</div>);
}

function Clients({data,set,L}){
const[show,setShow]=useState(false);const[edit,setEdit]=useState(null);const[search,setSearch]=useState('');
const blank={name:'',email:'',phone:'',company:'',address:'',status:'Active',notes:''};
const[form,setForm]=useState(blank);
const filtered=data.filter(c=>(c.name||'').toLowerCase().includes(search.toLowerCase())||(c.company||'').toLowerCase().includes(search.toLowerCase()));
const save=()=>{if(!form.name)return;
if(edit){set(data.map(c=>c.id===edit?{...form,id:edit}:c));L('Updated Client',form.name)}
else{set([...data,{...form,id:ID()}]);L('Added Client',form.name)}
setShow(false);setEdit(null);setForm(blank)};
const del=(id,n)=>{set(data.filter(c=>c.id!==id));L('Deleted Client',n)};
return(<div>
<div className="flex justify-between items-center mb-4">
<input placeholder="Search clients..." value={search} onChange={e=>setSearch(e.target.value)} style={{maxWidth:300}}/>
<button className="btn btn-primary" onClick={()=>{setForm(blank);setEdit(null);setShow(true)}}>+ Add Client</button>
</div>
<div className="card" style={{overflow:'auto'}}>
<table><thead><tr><th>Name</th><th>Company</th><th>Email</th><th>Phone</th><th>Status</th><th>Actions</th></tr></thead>
<tbody>{filtered.map(c=>(<tr key={c.id}>
<td className="font-medium">{c.name}</td><td>{c.company||'-'}</td><td className="text-sm">{c.email||'-'}</td>
<td className="text-sm">{c.phone||'-'}</td>
<td><span className={`badge ${c.status==='Active'?'badge-green':'badge-red'}`}>{c.status}</span></td>
<td><div className="flex gap-2"><button className="btn btn-outline" onClick={()=>{setForm(c);setEdit(c.id);setShow(true)}}>Edit</button>
<button className="btn btn-danger" onClick={()=>del(c.id,c.name)}>Del</button></div></td>
</tr>))}</tbody></table></div>
<Modal open={show} onClose={()=>{setShow(false);setEdit(null)}} title={edit?'Edit Client':'Add Client'}>
<div className="grid-2">
<div><label className="text-xs font-medium text-gray">Name*</label><input value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/></div>
<div><label className="text-xs font-medium text-gray">Company</label><input value={form.company} onChange={e=>setForm({...form,company:e.target.value})}/></div>
<div><label className="text-xs font-medium text-gray">Email</label><input value={form.email} onChange={e=>setForm({...form,email:e.target.value})}/></div>
<div><label className="text-xs font-medium text-gray">Phone</label><input value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})}/></div>
<div style={{gridColumn:'span 2'}}><label className="text-xs font-medium text-gray">Address</label><input value={form.address||''} onChange={e=>setForm({...form,address:e.target.value})}/></div>
<div><label className="text-xs font-medium text-gray">Status</label><select value={form.status} onChange={e=>setForm({...form,status:e.target.value})}><option>Active</option><option>Inactive</option></select></div>
<div style={{gridColumn:'span 2'}}><label className="text-xs font-medium text-gray">Notes</label><textarea value={form.notes||''} onChange={e=>setForm({...form,notes:e.target.value})} rows={2}/></div>
</div>
<div className="flex justify-between mt-4"><button className="btn btn-outline" onClick={()=>{setShow(false);setEdit(null)}}>Cancel</button>
<button className="btn btn-primary" onClick={save}>{edit?'Update':'Add'} Client</button></div>
</Modal>
</div>);
}

function Complaints({data,set,emps,L}){
const[show,setShow]=useState(false);const[edit,setEdit]=useState(null);
const blank={title:'',description:'',employee:'',priority:'Medium',status:'Open',date:NOW()};
const[form,setForm]=useState(blank);
const save=()=>{if(!form.title)return;
if(edit){set(data.map(c=>c.id===edit?{...form,id:edit}:c));L('Updated Complaint',form.title)}
else{set([...data,{...form,id:ID()}]);L('Filed Complaint',form.title)}
setShow(false);setEdit(null);setForm(blank)};
return(<div>
<div className="flex justify-between items-center mb-4">
<div className="flex gap-2">{['All','Open','In Progress','Resolved'].map(s=>(
<button key={s} className="btn btn-outline text-sm">{s} ({s==='All'?data.length:data.filter(c=>c.status===s).length})</button>
))}</div>
<button className="btn btn-primary" onClick={()=>{setForm(blank);setEdit(null);setShow(true)}}>+ File Complaint</button>
</div>
<div className="card" style={{overflow:'auto'}}>
<table><thead><tr><th>Title</th><th>Employee</th><th>Priority</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
<tbody>{data.map(c=>(<tr key={c.id}>
<td className="font-medium">{c.title}</td>
<td className="text-sm">{c.employee||'-'}</td>
<td><span className={`badge ${c.priority==='High'?'badge-red':c.priority==='Medium'?'badge-yellow':'badge-green'}`}>{c.priority}</span></td>
<td><span className={`badge ${c.status==='Resolved'?'badge-green':c.status==='In Progress'?'badge-blue':'badge-yellow'}`}>{c.status}</span></td>
<td className="text-sm">{FD(c.date)}</td>
<td><div className="flex gap-2"><button className="btn btn-outline" onClick={()=>{setForm(c);setEdit(c.id);setShow(true)}}>Edit</button>
<button className="btn btn-danger" onClick={()=>{set(data.filter(x=>x.id!==c.id));L('Deleted Complaint',c.title)}}>Del</button></div></td>
</tr>))}</tbody></table></div>
<Modal open={show} onClose={()=>{setShow(false);setEdit(null)}} title={edit?'Edit Complaint':'File Complaint'}>
<div className="flex-col gap-3">
<div><label className="text-xs font-medium text-gray">Title*</label><input value={form.title} onChange={e=>setForm({...form,title:e.target.value})}/></div>
<div><label className="text-xs font-medium text-gray">Description</label><textarea value={form.description||''} onChange={e=>setForm({...form,description:e.target.value})} rows={3}/></div>
<div className="grid-2">

<span className="text-xs text-gray">{FD(e.startDate)}</span>
</div>)):<p className="text-sm text-gray">No employees added yet</p>}
</div>
</div>);
}

function AuditLog({data}){
const[search,setSearch]=useState('');
const filtered=data.filter(l=>(l.action||'').toLowerCase().includes(search.toLowerCase())||(l.details||'').toLowerCase().includes(search.toLowerCase()));
return(<div>
<input placeholder="Search audit logs..." value={search} onChange={e=>setSearch(e.target.value)} className="mb-4" style={{maxWidth:400}}/>
<div className="card" style={{overflow:'auto'}}>
<table><thead><tr><th>Timestamp</th><th>Action</th><th>Details</th><th>User</th></tr></thead>
<tbody>{filtered.slice(0,100).map(l=>(<tr key={l.id}>
<td className="text-xs text-gray">{new Date(l.timestamp).toLocaleString()}</td>
<td><span className="badge badge-blue">{l.action}</span></td>
<td className="text-sm">{l.details}</td>
<td className="text-sm">{l.user}</td>
</tr>))}</tbody></table>
{!filtered.length&&<p className="text-sm text-gray p-4">No audit logs yet</p>}
</div>
</div>);
}

function Analytics({emps,clients,complaints,payroll,tasks}){
const depts={};emps.forEach(e=>{const d=e.department||'Other';depts[d]=(depts[d]||0)+1});
const statusCount={};tasks.forEach(t=>{const s=t.status||'Unknown';statusCount[s]=(statusCount[s]||0)+1});
const compStatus={};complaints.forEach(c=>{const s=c.status||'Unknown';compStatus[s]=(compStatus[s]||0)+1});
const totalPay=payroll.reduce((s,p)=>s+(p.amount||0),0);
const avgPay=payroll.length?totalPay/payroll.length:0;
return(<div>
<div className="grid-4 mb-4">
<div className="stat"><h3>Employees</h3><p>{emps.length}</p></div>
<div className="stat"><h3>Clients</h3><p>{clients.length}</p></div>
<div className="stat"><h3>Avg Payroll</h3><p>${avgPay.toLocaleString(undefined,{maximumFractionDigits:0})}</p></div>
<div className="stat"><h3>Total Payroll</h3><p>${totalPay.toLocaleString()}</p></div>
</div>
<div className="grid-2 mb-4">
<div className="card"><h3 className="font-bold mb-4">Employees by Department</h3>
{Object.entries(depts).map(([d,c])=>(<div key={d} className="flex justify-between items-center mb-2">
<span className="text-sm">{d}</span>
<div className="flex items-center gap-2"><div className="progress-bar" style={{width:120}}><div className="progress-fill" style={{width:`${(c/Math.max(...Object.values(depts)))*100}%`}}/></div>
<span className="font-bold text-sm">{c}</span></div>
</div>))}
{!Object.keys(depts).length&&<p className="text-sm text-gray">No data</p>}
</div>
<div className="card"><h3 className="font-bold mb-4">Tasks by Status</h3>
{Object.entries(statusCount).map(([s,c])=>(<div key={s} className="flex justify-between items-center mb-2">
<span className={`badge ${s==='Done'?'badge-green':s==='In Progress'?'badge-blue':'badge-yellow'}`}>{s}</span>
<span className="font-bold">{c}</span>
</div>))}
{!Object.keys(statusCount).length&&<p className="text-sm text-gray">No data</p>}
</div>
</div>
<div className="grid-2">
<div className="card"><h3 className="font-bold mb-4">Complaints Overview</h3>
{Object.entries(compStatus).map(([s,c])=>(<div key={s} className="flex justify-between items-center mb-2">
<span className={`badge ${s==='Resolved'?'badge-green':s==='Open'?'badge-yellow':'badge-blue'}`}>{s}</span>
<span className="font-bold">{c}</span>
</div>))}
{!Object.keys(compStatus).length&&<p className="text-sm text-gray">No complaints</p>}
</div>
<div className="card"><h3 className="font-bold mb-4">Quick Stats</h3>
<div className="mb-2"><span className="text-sm text-gray">Active Employees:</span> <span className="font-bold">{emps.filter(e=>e.status==='Active').length}</span></div>
<div className="mb-2"><span className="text-sm text-gray">Active Clients:</span> <span className="font-bold">{clients.filter(c=>c.status==='Active').length}</span></div>
<div className="mb-2"><span className="text-sm text-gray">Open Complaints:</span> <span className="font-bold">{complaints.filter(c=>c.status!=='Resolved').length}</span></div>
<div className="mb-2"><span className="text-sm text-gray">Pending Tasks:</span> <span className="font-bold">{tasks.filter(t=>t.status!=='Done').length}</span></div>
<div className="mb-2"><span className="text-sm text-gray">Pending Payroll:</span> <span className="font-bold">${payroll.filter(p=>p.status==='Pending').reduce((s,p)=>s+(p.amount||0),0).toLocaleString()}</span></div>
</div>
</div>
</div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
