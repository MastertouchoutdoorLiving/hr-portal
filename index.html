<style>

<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useCallback,useRef}=React;
const LS=(k,d)=>{try{const v=localStorage.getItem('mtp_'+k);return v?JSON.parse(v):d}catch{return d}};
const SS=(k,v)=>{try{localStorage.setItem('mtp_'+k,JSON.stringify(v))}catch{}};
const useLS=(k,d)=>{
const[v,setV]=useState(()=>LS(k,d));
const skip=useRef(false);
useEffect(()=>{
const ref=fbDB.ref('hr/'+k);
ref.on('value',snap=>{const data=snap.val();if(data!==null&&data!==undefined){skip.current=true;setV(data);SS(k,data)}});
return()=>ref.off();
},[k]);
useEffect(()=>{if(skip.current){skip.current=false;return}SS(k,v);fbDB.ref('hr/'+k).set(v).catch(()=>{})},[k,v]);
return[v,setV];
};
const ID=()=>'_'+Math.random().toString(36).substr(2,9);
const FD=(d)=>d?new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'';
const NOW=()=>new Date().toISOString().split('T')[0];
const log=(logs,setLogs,action,details,user)=>{const l=[{id:ID(),action,details,timestamp:new Date().toISOString(),user:user||'Admin'},...logs];setLogs(l.slice(0,500))};
const exportCSV=(headers,rows,filename)=>{const csv=[headers.join(','),...rows.map(r=>r.map(c=>'"'+(c||'').toString().replace(/"/g,'""')+'"').join(','))].join('\n');const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename+'.csv';a.click();URL.revokeObjectURL(url)};

function Modal({open,onClose,title,children,wide}){
if(!open)return null;
return(<div className="modal-overlay" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()} style={wide?{maxWidth:900}:{}}>
<div className="flex justify-between items-center mb-4"><h2 className="text-xl font-bold">{title}</h2>
<button className="btn btn-outline" onClick={onClose}>X</button></div>{children}</div></div>);
}

function PhotoUpload({value,onChange}){
const handleFile=(e)=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=(ev)=>onChange(ev.target.result);r.readAsDataURL(f)};
return(<div className="flex items-center gap-3">
{value?<div className="avatar"><img src={value}/></div>:<div className="avatar">?</div>}
<input type="file" accept="image/*" onChange={handleFile} style={{fontSize:'12px'}}/>
</div>);
}

const PAGES=['Dashboard','Employees','Clients','Schedule','Expenses','Complaints','Payroll','Job Positions','Applicants','Tasks','Inventory','Announcements','Work Orders','Routes','Messages','Birthdays','Audit Log','Analytics'];
const ICONS=['\u{1F4CA}','\u{1F465}','\u{1F3E2}','\u{1F4C5}','\u{1F4B3}','\u{1F4CB}','\u{1F4B0}','\u{1F4BC}','\u{1F4DD}','\u2705','\u{1F4E6}','\u{1F4E2}','\u{1F527}','\u{1F5FA}','\u{1F4AC}','\u{1F382}','\u{1F4DC}','\u{1F4C8}'];

/* ===== ROLE-BASED ACCESS ===== */
const ROLES={OWNER:'Owner',MANAGER:'Manager',EMPLOYEE:'Employee'};
const canSeeSensitive=(role)=>role===ROLES.OWNER;
const canEdit=(role)=>role===ROLES.OWNER||role===ROLES.MANAGER;
const canEditPayroll=(role)=>role===ROLES.OWNER;

function LoginScreen({users,onLogin,onSetup}){
const[pin,setPin]=useState('');
const[selectedUser,setSelectedUser]=useState('');
const[error,setError]=useState('');
const handleLogin=()=>{
  if(!selectedUser){setError('Please select a user');return}
  const u=users.find(u=>u.id===selectedUser);
  if(!u){setError('User not found');return}
  if(u.pin&&u.pin!==pin){setError('Incorrect PIN');return}
  onLogin(u);
};
if(!users||users.length===0){
  return(<div className="login-bg"><div className="login-card">
    <div style={{textAlign:'center',marginBottom:24}}>
      <h1 className="text-2xl font-bold" style={{color:'#1e293b'}}>Master Touch</h1>
      <p className="text-sm text-gray">HR Portal - First Time Setup</p>
    </div>
    <p className="text-sm mb-4">No users found. Set up the Owner account to get started.</p>
    <button className="btn btn-primary w-full" onClick={onSetup}>Set Up Owner Account</button>
  </div></div>);
}
return(<div className="login-bg"><div className="login-card">
  <div style={{textAlign:'center',marginBottom:24}}>
    <h1 className="text-2xl font-bold" style={{color:'#1e293b'}}>Master Touch</h1>
    <p className="text-sm text-gray">HR Portal Login</p>
  </div>
  <div className="mb-4"><label className="text-xs font-medium text-gray">Select User</label>
    <select value={selectedUser} onChange={e=>{setSelectedUser(e.target.value);setError('')}}>
      <option value="">Choose your account...</option>
      {users.map(u=><option key={u.id} value={u.id}>{u.name} ({u.role})</option>)}
    </select></div>
  <div className="mb-4"><label className="text-xs font-medium text-gray">PIN (if set)</label>
    <input type="password" maxLength={6} value={pin} onChange={e=>{setPin(e.target.value);setError('')}} placeholder="Enter PIN" onKeyDown={e=>e.key==='Enter'&&handleLogin()}/></div>
  {error&&<p className="text-sm mb-4" style={{color:'#ef4444'}}>{error}</p>}
  <button className="btn btn-primary w-full" onClick={handleLogin}>Log In</button>
</div></div>);
}

function UserManagement({users,setUsers,L,currentUser}){
const[show,setShow]=useState(false);const[edit,setEdit]=useState(null);
const blank={name:'',role:ROLES.EMPLOYEE,pin:'',email:'',linkedEmployee:''};
const[form,setForm]=useState(blank);
const save=()=>{if(!form.name)return;
  if(edit){setUsers(users.map(u=>u.id===edit?{...form,id:edit}:u));L('Updated User',form.name)}
  else{setUsers([...users,{...form,id:ID()}]);L('Added User',form.name)}
  setShow(false);setEdit(null);setForm(blank)};
const del=(id,name)=>{if(id===currentUser.id){alert('Cannot delete yourself');return}setUsers(users.filter(u=>u.id!==id));L('Deleted User',name)};
return(<div>
  <div className="flex justify-between items-center mb-4">
    <h3 className="font-bold">User Accounts</h3>
    <button className="btn btn-primary" onClick={()=>{setForm(blank);setEdit(null);setShow(true)}}>+ Add User</button>
  </div>
  <div className="card" style={{overflow:'auto'}}>
    <table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Has PIN</th><th>Actions</th></tr></thead>
    <tbody>{users.map(u=>(<tr key={u.id}>
      <td className="font-medium">{u.name} {u.id===currentUser.id&&<span className="badge badge-blue">You</span>}</td>
      <td className="text-sm">{u.email||'-'}</td>
      <td><span className={`badge ${u.role===ROLES.OWNER?'badge-purple':u.role===ROLES.MANAGER?'badge-blue':'badge-green'}`}>{u.role}</span></td>
      <td>{u.pin?'Yes':'No'}</td>
      <td><div className="flex gap-2">
        <button className="btn btn-outline btn-sm" onClick={()=>{setForm(u);setEdit(u.id);setShow(true)}}>Edit</button>
        {u.id!==currentUser.id&&<button className="btn btn-danger btn-sm" onClick={()=>del(u.id,u.name)}>Del</button>}
      </div></td>
    </tr>))}</tbody></table>
  </div>
  <Modal open={show} onClose={()=>{setShow(false);setEdit(null)}} title={edit?'Edit User':'Add User'}>
    <div className="grid-2">
      <div><label className="text-xs font-medium text-gray">Name*</label><input value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/></div>
      <div><label className="text-xs font-medium text-gray">Email</label><input value={form.email||''} onChange={e=>setForm({...form,email:e.target.value})}/></div>
      <div><label className="text-xs font-medium text-gray">Role</label><select value={form.role} onChange={e=>setForm({...form,role:e.target.value})}>
        <option value={ROLES.OWNER}>Owner (Full Access)</option>
        <option value={ROLES.MANAGER}>Manager (No Sensitive Data)</option>
        <option value={ROLES.EMPLOYEE}>Employee (View Only)</option>
      </select></div>
      <div><label className="text-xs font-medium text-gray">PIN (optional, up to 6 digits)</label>
        <input type="password" maxLength={6} value={form.pin||''} onChange={e=>setForm({...form,pin:e.target.value})} placeholder="Leave blank for no PIN"/></div>
    </div>
    <div className="flex justify-between mt-4"><button className="btn btn-outline" onClick={()=>{setShow(false);setEdit(null)}}>Cancel</button>
    <button className="btn btn-primary" onClick={save}>{edit?'Update':'Add'} User</button></div>
  </Modal>
</div>);
}

function App(){
const[users,setUsers]=useLS('users',[]);
const[currentUser,setCurrentUser]=useState(null);
const[page,setPage]=useState('Dashboard');
const[emps,setEmps]=useLS('emps',[]);
const[clients,setCli]=useLS('clients',[]);
const[complaints,setComp]=useLS('complaints',[]);
const[payroll,setPay]=useLS('payroll',[]);
const[positions,setPos]=useLS('positions',[]);
const[applicants,setApp]=useLS('applicants',[]);
const[tasks,setTasks]=useLS('tasks',[]);
const[inventory,setInv]=useLS('inventory',[]);
const[messages,setMsg]=useLS('messages',[]);
const[logs,setLogs]=useLS('logs',[]);
const[training,setTraining]=useLS('training',[]);
const[reviews,setReviews]=useLS('reviews',[]);
const[pto,setPto]=useLS('pto',[]);
const[documents,setDocs]=useLS('documents',[]);
const[schedules,setSchedules]=useLS('schedules',[]);
const[expenses,setExpenses]=useLS('expenses',[]);
const[announcements,setAnnouncements]=useLS('announcements',[]);
const[workOrders,setWorkOrders]=useLS('workOrders',[]);
const[routes,setRoutes]=useLS('routes',[]);
const[serviceHistory,setServiceHistory]=useLS('serviceHistory',[]);
const L=(a,d)=>log(logs,setLogs,a,d,currentUser?.name||'System');

const handleSetup=()=>{
  const owner={id:ID(),name:'Nilson (Owner)',role:ROLES.OWNER,pin:'',email:'info@mastertouchpools.com'};
  setUsers([owner]);setCurrentUser(owner);L('System Setup','Owner account created');
};

const handleLogout=()=>{setCurrentUser(null);setPage('Dashboard')};

if(!currentUser){return <LoginScreen users={users} onLogin={setCurrentUser} onSetup={handleSetup}/>}

const role=currentUser.role;
const allPages=[...PAGES];
if(canSeeSensitive(role))allPages.push('Users');
const allIcons=[...ICONS];
if(canSeeSensitive(role))allIcons.push('\u{1F511}');

return(<div className="flex">
<div className="sidebar">
<div style={{padding:'20px 16px',borderBottom:'1px solid rgba(255,255,255,.1)'}}>
<h1 className="text-lg font-bold">Master Touch</h1>
<p className="text-xs" style={{color:'#94a3b8'}}>HR Portal</p>
</div>
<div style={{padding:'8px 16px',borderBottom:'1px solid rgba(255,255,255,.1)',marginBottom:4}}>
<div className="text-xs" style={{color:'#94a3b8'}}>Logged in as</div>
<div className="text-sm font-medium">{currentUser.name}</div>
<div className="flex items-center gap-2 mt-2">
<span className={`badge ${role===ROLES.OWNER?'badge-purple':role===ROLES.MANAGER?'badge-blue':'badge-green'}`} style={{fontSize:10}}>{role}</span>
<button className="text-xs" style={{color:'#94a3b8',background:'none',border:'none',cursor:'pointer',textDecoration:'underline'}} onClick={handleLogout}>Logout</button>
</div></div>
{allPages.map((p,i)=>(
<div key={p} className={`sidebar-item${page===p?' active':''}`} onClick={()=>setPage(p)}>
<span>{allIcons[i]}</span><span>{p}</span>
{p==='Announcements'&&(announcements||[]).filter(a=>!a.readBy||!a.readBy[currentUser.id]).length>0&&<span style={{marginLeft:'auto',background:'#ef4444',color:'white',borderRadius:'50%',width:18,height:18,fontSize:10,display:'flex',alignItems:'center',justifyContent:'center'}}>{(announcements||[]).filter(a=>!a.readBy||!a.readBy[currentUser.id]).length}</span>}
</div>
))}
</div>
<div className="main">
<div className="flex justify-between items-center mb-4">
<h1 className="text-2xl font-bold">{page}</h1>
<span className="text-sm text-gray">{new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</span>
<NotificationBell emps={emps} pto={pto} training={training} inventory={inventory}/>
</div>
{page==='Dashboard'&&<Dashboard emps={emps} clients={clients} complaints={complaints} tasks={tasks} payroll={payroll} role={role} training={training} pto={pto} schedules={schedules} expenses={expenses} announcements={announcements} workOrders={workOrders}/>}
{page==='Employees'&&<Employees data={emps} set={setEmps} L={L} role={role} complaints={complaints} setComp={setComp} training={training} setTraining={setTraining} payroll={payroll} setPay={setPay} reviews={reviews} setReviews={setReviews} pto={pto} setPto={setPto} documents={documents} setDocs={setDocs}/>}
{page==='Clients'&&<Clients data={clients} set={setCli} L={L} role={role} serviceHistory={serviceHistory} setServiceHistory={setServiceHistory} emps={emps} inventory={inventory}/>}
{page==='Complaints'&&<Complaints data={complaints} set={setComp} emps={emps} L={L} role={role}/>}
{page==='Payroll'&&<PayrollPage data={payroll} set={setPay} emps={emps} L={L} role={role}/>}
{page==='Job Positions'&&<Positions data={positions} set={setPos} L={L} role={role}/>}
{page==='Applicants'&&<Applicants data={applicants} set={setApp} positions={positions} L={L} role={role}/>}
{page==='Tasks'&&<Tasks data={tasks} set={setTasks} emps={emps} L={L} role={role}/>}
{page==='Inventory'&&<Inventory data={inventory} set={setInv} L={L} role={role}/>}
{page==='Schedule'&&<Schedule data={schedules} set={setSchedules} emps={emps} L={L} role={role}/>}
{page==='Expenses'&&<Expenses data={expenses} set={setExpenses} L={L} role={role}/>}
{page==='Announcements'&&<Announcements data={announcements} set={setAnnouncements} currentUser={currentUser} L={L} role={role}/>}
{page==='Work Orders'&&<WorkOrders data={workOrders} set={setWorkOrders} emps={emps} clients={clients} inventory={inventory} setInv={setInv} L={L} role={role}/>}
{page==='Routes'&&<Routes data={routes} set={setRoutes} emps={emps} clients={clients} L={L} role={role}/>}
{page==='Messages'&&<Messages data={messages} set={setMsg} emps={emps} currentUser={currentUser}/>}
{page==='Birthdays'&&<Birthdays emps={emps}/>}
{page==='Audit Log'&&<AuditLog data={logs}/>}
{page==='Analytics'&&<Analytics emps={emps} clients={clients} complaints={complaints} payroll={payroll} tasks={tasks} role={role} training={training} expenses={expenses}/>}
{page==='Users'&&canSeeSensitive(role)&&<UserManagement users={users} setUsers={setUsers} L={L} currentUser={currentUser}/>}
</div>
</div>);
}

function Dashboard({emps,clients,complaints,tasks,payroll,role,training,pto,schedules,expenses,announcements,workOrders}){
const active=complaints.filter(c=>c.status!=='Resolved').length;
const pending=tasks.filter(t=>t.status!=='Done').length;
const today=new Date();
const upcomingBdays=emps.filter(e=>{if(!e.birthday)return false;const b=new Date(e.birthday+'T12:00:00');const diff=Math.ceil((new Date(today.getFullYear(),b.getMonth(),b.getDate())-today)/(1000*60*60*24));return diff>=0&&diff<=30});
const expiringTraining=training.filter(t=>{if(!t.expiryDate)return false;const d=new Date(t.expiryDate);const diff=Math.ceil((d-today)/(1000*60*60*24));return diff>=0&&diff<=30});
const pendingPto=pto.filter(p=>p.status==='Pending').length;
const todayShifts=(schedules||[]).filter(s=>s.date===NOW());
const thisMonthExpenses=(expenses||[]).filter(e=>{const d=new Date(e.date+'T12:00:00');const n=new Date();return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear()});
const monthExpTotal=thisMonthExpenses.reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
const recentAnn=(announcements||[]).slice(-3).reverse();
const openWO=(workOrders||[]).filter(w=>w.status!=='Completed'&&w.status!=='Cancelled').length;
return(<div>

function Employees({data,set,L,role,complaints,setComp,training,setTraining,payroll,setPay,reviews,setReviews,pto,setPto,documents,setDocs}){
const[show,setShow]=useState(false);
const[edit,setEdit]=useState(null);
const[search,setSearch]=useState('');
const[viewEmp,setViewEmp]=useState(null);
const blank={name:'',email:'',phone:'',position:'',department:'',startDate:NOW(),status:'Active',salary:'',payRate:'',payType:'Hourly',photo:'',address:'',emergencyName:'',emergencyPhone:'',emergencyRelation:'',birthday:'',ssn:'',notes:''};
const[form,setForm]=useState(blank);
const filtered=data.filter(e=>(e.name||'').toLowerCase().includes(search.toLowerCase())||(e.department||'').toLowerCase().includes(search.toLowerCase()));
const save=()=>{if(!form.name)return;
if(edit){set(data.map(e=>e.id===edit?{...form,id:edit}:e));L('Updated Employee',form.name)}
else{const n={...form,id:ID()};set([...data,n]);L('Added Employee',form.name)}
setShow(false);setEdit(null);setForm(blank)};
const del=(id,name)=>{if(!confirm('Delete '+name+'?'))return;set(data.filter(e=>e.id!==id));L('Deleted Employee',name)};
const openEdit=(e)=>{setForm(e);setEdit(e.id);setShow(true)};

if(viewEmp){
  const emp=data.find(e=>e.id===viewEmp);
  if(!emp)return <p>Employee not found</p>;
  return <EmployeeDetail emp={emp} onBack={()=>setViewEmp(null)} onEdit={()=>{openEdit(emp);setViewEmp(null)}} role={role} complaints={complaints} setComp={setComp} training={training} setTraining={setTraining} payroll={payroll} setPay={setPay} reviews={reviews} setReviews={setReviews} pto={pto} setPto={setPto} documents={documents} setDocs={setDocs} L={L} emps={data}/>;
}

return(<div>
<div className="flex justify-between items-center mb-4">
<input placeholder="Search employees..." value={search} onChange={e=>setSearch(e.target.value)} style={{maxWidth:300}}/>
{canEdit(role)&&<button className="btn btn-primary" onClick={()=>{setForm(blank);setEdit(null);setShow(true)}}>+ Add Employee</button>}
</div>
<div className="card" style={{overflow:'auto'}}>
<table><thead><tr><th>Employee</th><th>Position</th><th>Department</th><th>Status</th><th>Start Date</th><th>Actions</th></tr></thead>
<tbody>{filtered.map(e=>(<tr key={e.id}>
<td><div className="flex items-center gap-2" style={{cursor:'pointer'}} onClick={()=>setViewEmp(e.id)}>
<div className="avatar">{e.photo?<img src={e.photo}/>:(e.name||'?')[0]}</div>
<div><div className="font-medium" style={{color:'#3b82f6'}}>{e.name}</div><div className="text-xs text-gray">{e.email}</div></div>
</div></td>
<td>{e.position||'-'}</td><td>{e.department||'-'}</td>
<td><span className={`badge ${e.status==='Active'?'badge-green':e.status==='On Leave'?'badge-yellow':'badge-red'}`}>{e.status||'Active'}</span></td>
<td className="text-sm">{FD(e.startDate)}</td>
<td><div className="flex gap-2">
<button className="btn btn-outline btn-sm" onClick={()=>setViewEmp(e.id)}>View</button>
{canEdit(role)&&<button className="btn btn-outline btn-sm" onClick={()=>openEdit(e)}>Edit</button>}
{canSeeSensitive(role)&&<button className="btn btn-danger btn-sm" onClick={()=>del(e.id,e.name)}>Del</button>}
</div></td>
</tr>))}</tbody></table>
{!filtered.length&&<p className="text-sm text-gray p-4">No employees found</p>}
</div>
<Modal open={show} onClose={()=>{setShow(false);setEdit(null)}} title={edit?'Edit Employee':'Add Employee'} wide>
<div className="flex-col gap-3">
<PhotoUpload value={form.photo} onChange={v=>setForm({...form,photo:v})}/>
<h4 className="font-bold text-sm mt-2" style={{color:'#3b82f6'}}>Basic Information</h4>
<div className="grid-2">
<div><label className="text-xs font-medium text-gray">Name*</label><input value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/></div>
<div><label className="text-xs font-medium text-gray">Email</label><input value={form.email} onChange={e=>setForm({...form,email:e.target.value})}/></div>
<div><label className="text-xs font-medium text-gray">Phone</label><input value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})}/></div>
<div><label className="text-xs font-medium text-gray">Birthday</label><input type="date" value={form.birthday||''} onChange={e=>setForm({...form,birthday:e.target.value})}/></div>
<div style={{gridColumn:'span 2'}}><label className="text-xs font-medium text-gray">Address</label><input value={form.address||''} onChange={e=>setForm({...form,address:e.target.value})}/></div>
</div>
<h4 className="font-bold text-sm mt-2" style={{color:'#3b82f6'}}>Employment Details</h4>
<div className="grid-2">
<div><label className="text-xs font-medium text-gray">Position</label><input value={form.position} onChange={e=>setForm({...form,position:e.target.value})}/></div>
<div><label className="text-xs font-medium text-gray">Department</label><input value={form.department} onChange={e=>setForm({...form,department:e.target.value})}/></div>
<div><label className="text-xs font-medium text-gray">Start Date</label><input type="date" value={form.startDate} onChange={e=>setForm({...form,startDate:e.target.value})}/></div>
<div><label className="text-xs font-medium text-gray">Status</label><select value={form.status} onChange={e=>setForm({...form,status:e.target.value})}><option>Active</option><option>Inactive</option><option>On Leave</option><option>Terminated</option></select></div>
</div>
{canSeeSensitive(role)&&<><h4 className="font-bold text-sm mt-2" style={{color:'#ef4444'}}>Sensitive Information (Owner Only)</h4>
<div className="grid-2">
<div><label className="text-xs font-medium text-gray">Pay Rate</label><input type="number" step="0.01" value={form.payRate||''} onChange={e=>setForm({...form,payRate:e.target.value})}/></div>
<div><label className="text-xs font-medium text-gray">Pay Type</label><select value={form.payType||'Hourly'} onChange={e=>setForm({...form,payType:e.target.value})}><option>Hourly</option><option>Salary</option><option>Commission</option></select></div>
<div><label className="text-xs font-medium text-gray">Annual Salary</label><input type="number" value={form.salary} onChange={e=>setForm({...form,salary:e.target.value})}/></div>
<div><label className="text-xs font-medium text-gray">SSN (last 4)</label><input maxLength={4} value={form.ssn||''} onChange={e=>setForm({...form,ssn:e.target.value})} placeholder="XXXX"/></div>
</div></>}
<h4 className="font-bold text-sm mt-2" style={{color:'#3b82f6'}}>Emergency Contact</h4>
<div className="grid-3">
<div><label className="text-xs font-medium text-gray">Name</label><input value={form.emergencyName||''} onChange={e=>setForm({...form,emergencyName:e.target.value})}/></div>
<div><label className="text-xs font-medium text-gray">Phone</label><input value={form.emergencyPhone||''} onChange={e=>setForm({...form,emergencyPhone:e.target.value})}/></div>
<div><label className="text-xs font-medium text-gray">Relationship</label><input value={form.emergencyRelation||''} onChange={e=>setForm({...form,emergencyRelation:e.target.value})}/></div>
</div>
<div className="mt-2"><label className="text-xs font-medium text-gray">Notes</label><textarea value={form.notes||''} onChange={e=>setForm({...form,notes:e.target.value})} rows={2}/></div>
<div className="flex justify-between mt-4"><button className="btn btn-outline" onClick={()=>{setShow(false);setEdit(null)}}>Cancel</button>
<button className="btn btn-primary" onClick={save}>{edit?'Update':'Add'} Employee</button></div>
</div>
</Modal>
</div>);
}

function NotificationBell({emps,pto,training,inventory}){
const[open,setOpen]=useState(false);
const today=new Date();
const alerts=[];
const pendingPto=pto.filter(p=>p.status==='Pending');
if(pendingPto.length>0)alerts.push({msg:pendingPto.length+' pending time-off request'+(pendingPto.length>1?'s':''),color:'#3b82f6'});
const expCerts=training.filter(t=>{if(!t.expiryDate)return false;const d=new Date(t.expiryDate);return(d-today)/86400000<=30&&d>today});
if(expCerts.length>0)alerts.push({msg:expCerts.length+' certification'+(expCerts.length>1?'s':'')+' expiring soon',color:'#f59e0b'});
const expiredCerts=training.filter(t=>t.expiryDate&&new Date(t.expiryDate)<today);
if(expiredCerts.length>0)alerts.push({msg:expiredCerts.length+' expired certification'+(expiredCerts.length>1?'s':''),color:'#ef4444'});
const lowStock=inventory.filter(i=>i.quantity<=i.minStock&&i.minStock>0);
if(lowStock.length>0)alerts.push({msg:lowStock.length+' inventory item'+(lowStock.length>1?'s':'')+' low on stock',color:'#ef4444'});
return(<div style={{position:'relative'}}>
<button className="btn btn-outline" style={{position:'relative',padding:'8px 12px'}} onClick={()=>setOpen(!open)}>
{'🔔'}{alerts.length>0&&<span style={{position:'absolute',top:-4,right:-4,background:'#ef4444',color:'white',borderRadius:'50%',width:18,height:18,fontSize:10,display:'flex',alignItems:'center',justifyContent:'center'}}>{alerts.length}</span>}
</button>
{open&&<div style={{position:'absolute',right:0,top:'110%',background:'white',border:'1px solid #e2e8f0',borderRadius:8,width:300,zIndex:100,boxShadow:'0 4px 20px rgba(0,0,0,.15)'}}>
<div style={{padding:'12px 16px',borderBottom:'1px solid #e2e8f0',fontWeight:600,fontSize:14}}>Notifications</div>
{alerts.length?alerts.map((a,i)=><div key={i} style={{padding:'10px 16px',borderBottom:'1px solid #f1f5f9',display:'flex',alignItems:'center',gap:8}}>
<span style={{width:8,height:8,borderRadius:'50%',background:a.color,display:'inline-block',flexShrink:0}}></span>

<div style={{padding:16,fontSize:13,color:'#64748b',textAlign:'center'}}>All clear - no alerts!</div>}

</div>);

/* ===== SCHEDULE / SHIFT MANAGEMENT ===== */
function Schedule({data,set,emps,L,role}){
const[show,setShow]=useState(false);const[edit,setEdit]=useState(null);
const[week,setWeek]=useState(NOW());
const blank={employeeId:'',employeeName:'',date:NOW(),startTime:'08:00',endTime:'17:00',position:'',notes:'',status:'Scheduled'};
const[form,setForm]=useState(blank);
const getWeekDates=(startDate)=>{const d=new Date(startDate+'T12:00:00');const day=d.getDay();const mon=new Date(d);mon.setDate(d.getDate()-(day===0?6:day-1));return Array.from({length:7},(_,i)=>{const nd=new Date(mon);nd.setDate(mon.getDate()+i);return nd.toISOString().split('T')[0]})};
const weekDates=getWeekDates(week);
const weekShifts=data.filter(s=>weekDates.includes(s.date));
const save=()=>{if(!form.employeeName||!form.date)return;
if(edit){set(data.map(s=>s.id===edit?{...form,id:edit}:s));L('Updated Shift',form.employeeName)}
else{set([...data,{...form,id:ID()}]);L('Added Shift',form.employeeName+' - '+form.date)}

<div className="info-row" style={{borderTop:'2px solid #e2e8f0',marginTop:4,paddingTop:8}}><span className="info-label font-bold">Total</span><span className="info-value font-bold" style={{color:'#22c55e',fontSize:18}}>{'$$'+(parseFloat(wo.totalCost)||0).toLocaleString()}</span></div>
</div></div>
{(wo.parts||[]).length>0&&<div className="card mb-4"><h3 className="font-bold mb-2">Parts Used</h3>
<table><thead><tr><th>Item</th><th>Qty</th><th>Unit Cost</th><th>Subtotal</th></tr></thead>
<tbody>{(wo.parts||[]).map(p=><tr key={p.id}><td>{p.itemName}</td><td>{p.qty}</td><td>{'$$'+(p.unitCost||0)}</td><td className="font-bold">{'$$'+((p.qty||0)*(p.unitCost||0)).toFixed(2)}</td></tr>)}</tbody>
</table></div>}
{canEdit(role)&&wo.status!=='Completed'&&wo.status!=='Cancelled'&&<div className="flex gap-2 flex-wrap">
{wo.status==='Open'&&<button className="btn btn-primary" onClick={()=>changeStatus(wo.id,'In Progress')}>Start Work</button>}
{wo.status==='In Progress'&&<button className="btn btn-success" onClick={()=>changeStatus(wo.id,'Completed')}>Mark Complete</button>}
<button className="btn btn-warning" onClick={()=>changeStatus(wo.id,'On Hold')}>Put On Hold</button>
<button className="btn btn-danger" onClick={()=>changeStatus(wo.id,'Cancelled')}>Cancel</button>
</div>}
</div>);
}

return(<div>
<div className="grid-4 mb-4">
<div className="stat"><h3>Open</h3><p style={{color:'#f59e0b'}}>{stats.open}</p></div>
<div className="stat"><h3>In Progress</h3><p style={{color:'#3b82f6'}}>{stats.inProgress}</p></div>
<div className="stat"><h3>Completed</h3><p style={{color:'#22c55e'}}>{stats.completed}</p></div>
{canSeeSensitive(role)&&<div className="stat"><h3>Revenue (Completed)</h3><p style={{fontSize:20}}>{'$$'+stats.totalRevenue.toLocaleString()}</p></div>}
</div>
<div className="flex justify-between items-center mb-4">
<div className="flex gap-2" style={{flexWrap:'wrap'}}>
{['All','Open','In Progress','On Hold','Completed','Cancelled'].map(s=>(
<button key={s} className={'btn btn-sm '+(filter===s?'btn-primary':'btn-outline')} onClick={()=>setFilter(s)}>
{s} ({s==='All'?data.length:data.filter(w=>w.status===s).length})
</button>))}
</div>
<div className="flex gap-2">
{canSeeSensitive(role)&&<button className="btn btn-outline btn-sm" onClick={()=>exportCSV(['ID','Client','Title','Type','Assignee','Status','Priority','Scheduled','Labor Hrs','Total Cost'],data.map(w=>[w.id,w.clientName,w.title,w.type,w.assigneeName||'',w.status,w.priority,w.scheduledDate,w.laborHours||0,w.totalCost||0]),'work_orders')}>{'📥'} Export</button>}
{canEdit(role)&&<button className="btn btn-primary" onClick={()=>{setForm(blank);setEdit(null);setShow(true)}}>+ New Work Order</button>}
</div>
</div>
<div className="card" style={{overflow:'auto'}}>
<table><thead><tr><th>WO #</th><th>Title</th><th>Client</th><th>Type</th><th>Assigned To</th><th>Priority</th><th>Status</th><th>Scheduled</th>{canSeeSensitive(role)&&<th>Cost</th>}<th>Actions</th></tr></thead>
<tbody>{filtered.sort((a,b)=>b.scheduledDate.localeCompare(a.scheduledDate)).map((wo,i)=>(
<tr key={wo.id} style={{cursor:'pointer'}} onClick={()=>setView(wo.id)}>
<td className="text-xs text-gray">#{(filtered.length-i).toString().padStart(4,'0')}</td>
<td className="font-medium" style={{color:'#3b82f6'}}>{wo.title}</td>
<td className="text-sm">{wo.clientName}</td>
<td><span className={'badge '+(typeColors[wo.type]||'badge-blue')} style={{fontSize:10}}>{wo.type}</span></td>
<td className="text-sm">{wo.assigneeName||<span className="text-gray">Unassigned</span>}</td>
<td><span className={'badge '+(wo.priority==='High'?'badge-red':wo.priority==='Low'?'badge-green':'badge-yellow')} style={{fontSize:10}}>{wo.priority}</span></td>
<td><span className={'badge '+(statusColors[wo.status]||'badge-yellow')} style={{fontSize:10}}>{wo.status}</span></td>
<td className="text-sm">{FD(wo.scheduledDate)}</td>
{canSeeSensitive(role)&&<td className="font-bold text-sm">{'$$'+(parseFloat(wo.totalCost)||0).toLocaleString()}</td>}
<td onClick={e=>e.stopPropagation()}><div className="flex gap-1">
<button className="btn btn-outline btn-sm" onClick={()=>setView(wo.id)}>View</button>
{canEdit(role)&&<button className="btn btn-outline btn-sm" onClick={()=>openEdit(wo)}>Edit</button>}
{canEdit(role)&&wo.status==='Open'&&<button className="btn btn-success btn-sm" onClick={()=>changeStatus(wo.id,'In Progress')}>Start</button>}
{canEdit(role)&&wo.status==='In Progress'&&<button className="btn btn-success btn-sm" onClick={()=>changeStatus(wo.id,'Completed')}>Done</button>}
</div></td>
</tr>))}</tbody></table>
{!filtered.length&&<p className="text-sm text-gray p-4">No work orders found</p>}
</div>
<Modal open={show} onClose={()=>{setShow(false);setEdit(null)}} title={edit?'Edit Work Order':'New Work Order'} wide>
<div className="grid-2">
<div style={{gridColumn:'span 2'}}><label className="text-xs font-medium text-gray">Title*</label><input value={form.title} onChange={e=>setForm({...form,title:e.target.value})} placeholder="e.g. Pump Replacement, Monthly Service"/></div>
<div><label className="text-xs font-medium text-gray">Client*</label>
<select value={form.clientId} onChange={e=>{const cl=clients.find(x=>x.id===e.target.value);setForm({...form,clientId:e.target.value,clientName:cl?cl.name:''})}}>
<option value="">Select client...</option>{clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></div>
<div><label className="text-xs font-medium text-gray">Assign To</label>
<select value={form.assigneeId} onChange={e=>{const em=emps.find(x=>x.id===e.target.value);setForm({...form,assigneeId:e.target.value,assigneeName:em?em.name:''})}}>
<option value="">Select employee...</option>{emps.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}</select></div>
<div><label className="text-xs font-medium text-gray">Type</label>
<select value={form.type} onChange={e=>setForm({...form,type:e.target.value})}>
<option>Service</option><option>Repair</option><option>Installation</option><option>Inspection</option><option>Cleaning</option><option>Other</option></select></div>
<div><label className="text-xs font-medium text-gray">Priority</label>
<select value={form.priority} onChange={e=>setForm({...form,priority:e.target.value})}>
<option>Low</option><option>Normal</option><option>High</option><option>Urgent</option></select></div>
<div><label className="text-xs font-medium text-gray">Status</label>
<select value={form.status} onChange={e=>setForm({...form,status:e.target.value})}>
<option>Open</option><option>In Progress</option><option>On Hold</option><option>Completed</option><option>Cancelled</option></select></div>
<div><label className="text-xs font-medium text-gray">Scheduled Date</label><input type="date" value={form.scheduledDate} onChange={e=>setForm({...form,scheduledDate:e.target.value})}/></div>
{form.status==='Completed'&&<div><label className="text-xs font-medium text-gray">Completed Date</label><input type="date" value={form.completedDate||''} onChange={e=>setForm({...form,completedDate:e.target.value})}/></div>}
<div><label className="text-xs font-medium text-gray">Labor Hours</label><input type="number" step="0.5" value={form.laborHours||''} onChange={e=>setForm({...form,laborHours:e.target.value})} placeholder="0"/></div>
<div><label className="text-xs font-medium text-gray">Labor Rate ($/hr)</label><input type="number" step="0.01" value={form.laborRate||''} onChange={e=>setForm({...form,laborRate:e.target.value})} placeholder="0.00"/></div>
</div>
<div className="mt-2"><label className="text-xs font-medium text-gray">Description</label><textarea value={form.description||''} onChange={e=>setForm({...form,description:e.target.value})} rows={2}/></div>
<div className="mt-3"><h4 className="font-bold text-sm mb-2">Parts / Materials Used</h4>
<div className="grid-2 mb-2">
<div><label className="text-xs font-medium text-gray">Item Name</label>
<input list="inv-items" value={partLine.itemName} onChange={e=>{const inv=inventory.find(i=>i.name===e.target.value);setPartLine({...partLine,itemName:e.target.value,itemId:inv?inv.id:'',unitCost:inv?inv.cost:partLine.unitCost})}} placeholder="Search inventory or type name"/>
<datalist id="inv-items">{inventory.map(i=><option key={i.id} value={i.name}/>)}</datalist></div>
<div><label className="text-xs font-medium text-gray">Qty</label><input type="number" min="1" value={partLine.qty} onChange={e=>setPartLine({...partLine,qty:e.target.value})}/></div>
<div><label className="text-xs font-medium text-gray">Unit Cost</label><input type="number" step="0.01" value={partLine.unitCost||''} onChange={e=>setPartLine({...partLine,unitCost:e.target.value})}/></div>
<div style={{display:'flex',alignItems:'flex-end'}}><button className="btn btn-primary btn-sm" onClick={addPart} style={{width:'100%'}}>+ Add Part</button></div>
</div>
{(form.parts||[]).length>0&&<div className="card" style={{padding:8}}>
<table><thead><tr><th>Item</th><th>Qty</th><th>Unit Cost</th><th>Subtotal</th><th></th></tr></thead>
<tbody>{(form.parts||[]).map(p=><tr key={p.id}><td className="text-sm">{p.itemName}</td><td>{p.qty}</td><td>{'$$'+(p.unitCost||0)}</td><td className="font-bold">{'$$'+((parseFloat(p.qty)||0)*(parseFloat(p.unitCost)||0)).toFixed(2)}</td>
<td><button className="btn btn-danger btn-sm" onClick={()=>removePart(p.id)}>✕</button></td></tr>)}</tbody></table>
<div className="text-sm font-bold mt-2 text-right">Parts Subtotal: {'$$'+((form.parts||[]).reduce((s,p)=>(s+(parseFloat(p.qty)||0)*(parseFloat(p.unitCost)||0)),0)).toFixed(2)}</div>
</div>}
</div>
<div className="mt-2"><label className="text-xs font-medium text-gray">Notes</label><textarea value={form.notes||''} onChange={e=>setForm({...form,notes:e.target.value})} rows={2}/></div>
<div className="flex justify-between mt-4">
<div className="text-sm font-bold">Est. Total: {'$$'+((parseFloat(form.laborHours)||0)*(parseFloat(form.laborRate)||0)+(form.parts||[]).reduce((s,p)=>s+(parseFloat(p.qty)||0)*(parseFloat(p.unitCost)||0),0)).toFixed(2)}</div>
<div className="flex gap-2"><button className="btn btn-outline" onClick={()=>{setShow(false);setEdit(null)}}>Cancel</button>
<button className="btn btn-primary" onClick={save}>{edit?'Update':'Create'} Work Order</button></div>
</div>
</Modal>
</div>);
}

/* ===== ROUTE MANAGEMENT ===== */
function Routes({data,set,emps,clients,L,role}){
const[show,setShow]=useState(false);const[edit,setEdit]=useState(null);const[selRoute,setSelRoute]=useState(null);
const[activeDay,setActiveDay]=useState('Monday');
const days=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const blank={name:'',techId:'',techName:'',day:'Monday',stops:[],notes:'',color:'#3b82f6'};
const[form,setForm]=useState(blank);
const[stopClient,setStopClient]=useState('');
const colors=['#3b82f6','#22c55e','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899'];
const dayRoutes=data.filter(r=>r.day===activeDay);
const save=()=>{if(!form.name||!form.techName)return;
if(edit){set(data.map(r=>r.id===edit?{...form,id:edit}:r));L('Updated Route',form.name)}
else{set([...data,{...form,id:ID()}]);L('Created Route',form.name+' - '+form.day)}
setShow(false);setEdit(null);setForm(blank)};
const addStop=()=>{if(!stopClient)return;const cl=clients.find(c=>c.id===stopClient);if(!cl)return;
setForm({...form,stops:[...(form.stops||[]),{id:ID(),clientId:cl.id,clientName:cl.name,address:cl.address||'',order:(form.stops||[]).length+1,notes:''}]});
setStopClient('')};
const removeStop=(id)=>setForm({...form,stops:(form.stops||[]).filter(s=>s.id!==id)});
const moveStop=(id,dir)=>{const stops=[...(form.stops||[])];const idx=stops.findIndex(s=>s.id===id);const newIdx=idx+dir;if(newIdx<0||newIdx>=stops.length)return;[stops[idx],stops[newIdx]]=[stops[newIdx],stops[idx]];stops.forEach((s,i)=>s.order=i+1);setForm({...form,stops})};

if(selRoute){
const rt=data.find(r=>r.id===selRoute);if(!rt)return <p>Not found</p>;
return(<div>
<button className="btn btn-outline mb-4" onClick={()=>setSelRoute(null)}>{'←'} Back to Routes</button>
<div className="detail-header" style={{background:'linear-gradient(135deg,'+rt.color+','+rt.color+'cc)'}}>
<div className="flex justify-between items-center">
<div><h2 className="text-xl font-bold">{rt.name}</h2>
<p style={{color:'rgba(255,255,255,.8)'}}>{rt.day} {'•'} {rt.techName} {'•'} {(rt.stops||[]).length} stops</p></div>
{canEdit(role)&&<button className="btn btn-outline" style={{color:'white',borderColor:'rgba(255,255,255,.3)'}} onClick={()=>{setForm(rt);setEdit(rt.id);setShow(true);setSelRoute(null)}}>Edit Route</button>}
</div></div>
<div className="card">
<h3 className="font-bold mb-3">Stop List</h3>
{(rt.stops||[]).length?<div>{(rt.stops||[]).sort((a,b)=>a.order-b.order).map((stop,i)=>(
<div key={stop.id} className="flex items-center gap-3 p-3 mb-2" style={{background:'#f8fafc',borderRadius:8,borderLeft:'4px solid '+rt.color}}>
<div style={{width:28,height:28,borderRadius:'50%',background:rt.color,color:'white',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:12,flexShrink:0}}>{i+1}</div>
<div style={{flex:1}}>
<div className="font-medium">{stop.clientName}</div>
{stop.address&&<div className="text-xs text-gray">{stop.address}</div>}
{stop.notes&&<div className="text-xs" style={{color:'#f59e0b'}}>{stop.notes}</div>}
</div>
<span className="badge badge-blue text-xs">Stop {stop.order}</span>
</div>))}</div>:<p className="text-sm text-gray">No stops added</p>}
</div>
</div>);
}

return(<div>
<div className="flex gap-2 mb-4" style={{flexWrap:'wrap'}}>
{days.map(d=>{const cnt=data.filter(r=>r.day===d).length;return(<button key={d} className={'btn '+(activeDay===d?'btn-primary':'btn-outline')} onClick={()=>setActiveDay(d)}>
{d.slice(0,3)}{cnt>0&&<span style={{marginLeft:4,background:'white',color:'#3b82f6',borderRadius:'50%',width:16,height:16,fontSize:10,display:'inline-flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>{cnt}</span>}
</button>)})}
{canEdit(role)&&<button className="btn btn-primary" style={{marginLeft:'auto'}} onClick={()=>{setForm({...blank,day:activeDay});setEdit(null);setShow(true)}}>+ Add Route</button>}
</div>
<div className="mb-2"><h3 className="font-bold">{activeDay} Routes ({dayRoutes.length})</h3></div>
{dayRoutes.length?<div className="grid-2">{dayRoutes.map(rt=>(
<div key={rt.id} className="card" style={{borderTop:'4px solid '+rt.color,cursor:'pointer'}} onClick={()=>setSelRoute(rt.id)}>
<div className="flex justify-between items-start mb-2">
<div><h3 className="font-bold" style={{color:rt.color}}>{rt.name}</h3>
<p className="text-sm text-gray">{rt.techName}</p></div>
<span className="badge badge-blue">{(rt.stops||[]).length} stops</span>
</div>
{(rt.stops||[]).length>0&&<div className="mt-2">{(rt.stops||[]).slice(0,4).map((s,i)=>(
<div key={s.id} className="flex items-center gap-2 text-xs mb-1">
<span style={{width:18,height:18,borderRadius:'50%',background:rt.color,color:'white',display:'inline-flex',alignItems:'center',justifyContent:'center',fontWeight:700,flexShrink:0}}>{i+1}</span>
<span>{s.clientName}</span>
</div>))}
{(rt.stops||[]).length>4&&<p className="text-xs text-gray mt-1">+{(rt.stops||[]).length-4} more stops</p>}
</div>}
<div className="flex gap-2 mt-3" onClick={e=>e.stopPropagation()}>
<button className="btn btn-outline btn-sm" onClick={()=>setSelRoute(rt.id)}>View</button>
{canEdit(role)&&<button className="btn btn-outline btn-sm" onClick={()=>{setForm(rt);setEdit(rt.id);setShow(true)}}>Edit</button>}
{canEdit(role)&&<button className="btn btn-danger btn-sm" onClick={()=>{if(confirm('Delete route?')){set(data.filter(r=>r.id!==rt.id));L('Deleted Route',rt.name)}}}>Del</button>}
</div>
</div>))}
</div>:
<div className="card" style={{textAlign:'center',padding:40}}>
<div style={{fontSize:40,marginBottom:12}}>{'🗺'}</div>
<p className="text-gray">No routes for {activeDay}</p>
{canEdit(role)&&<button className="btn btn-primary mt-4" onClick={()=>{setForm({...blank,day:activeDay});setEdit(null);setShow(true)}}>Add {activeDay} Route</button>}
</div>}
<div className="card mt-4"><h3 className="font-bold mb-3">Weekly Summary</h3>
<table><thead><tr><th>Day</th><th>Routes</th><th>Total Stops</th><th>Technicians</th></tr></thead>
<tbody>{days.map(d=>{const dr=data.filter(r=>r.day===d);const stops=dr.reduce((s,r)=>s+(r.stops||[]).length,0);const techs=[...new Set(dr.map(r=>r.techName))];return(
<tr key={d} style={{background:d===activeDay?'#f0f9ff':'white',cursor:'pointer'}} onClick={()=>setActiveDay(d)}>
<td className="font-medium">{d}</td><td>{dr.length}</td><td>{stops}</td>
<td className="text-sm">{techs.join(', ')||'-'}</td></tr>)})}</tbody></table>
</div>
<Modal open={show} onClose={()=>{setShow(false);setEdit(null)}} title={edit?'Edit Route':'Add Route'} wide>
<div className="grid-2">
<div><label className="text-xs font-medium text-gray">Route Name*</label><input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="e.g. North Route, Beach Route"/></div>
<div><label className="text-xs font-medium text-gray">Day</label>
<select value={form.day} onChange={e=>setForm({...form,day:e.target.value})}>
{days.map(d=><option key={d}>{d}</option>)}</select></div>
<div><label className="text-xs font-medium text-gray">Technician*</label>
<select value={form.techId} onChange={e=>{const em=emps.find(x=>x.id===e.target.value);setForm({...form,techId:e.target.value,techName:em?em.name:''})}}>
<option value="">Select...</option>{emps.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}</select></div>
<div><label className="text-xs font-medium text-gray">Route Color</label>
<div className="flex gap-2 mt-1">{colors.map(col=><div key={col} onClick={()=>setForm({...form,color:col})} style={{width:28,height:28,borderRadius:'50%',background:col,cursor:'pointer',border:form.color===col?'3px solid #1e293b':'3px solid transparent'}}></div>)}</div>
</div>
</div>
<div className="mt-3"><h4 className="font-bold text-sm mb-2">Stops</h4>
<div className="flex gap-2 mb-3">
<select value={stopClient} onChange={e=>setStopClient(e.target.value)} style={{flex:1}}>
<option value="">Add client stop...</option>{clients.filter(cl=>!(form.stops||[]).find(s=>s.clientId===cl.id)).map(c=><option key={c.id} value={c.id}>{c.name}{c.address?' - '+c.address:''}</option>)}</select>
<button className="btn btn-primary btn-sm" onClick={addStop}>Add Stop</button>
</div>
{(form.stops||[]).length>0&&<div>{(form.stops||[]).sort((a,b)=>a.order-b.order).map((stop,i)=>(
<div key={stop.id} className="flex items-center gap-2 p-2 mb-1" style={{background:'#f8fafc',borderRadius:6}}>
<span style={{width:24,height:24,borderRadius:'50%',background:form.color,color:'white',display:'inline-flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:11,flexShrink:0}}>{i+1}</span>
<span className="text-sm font-medium" style={{flex:1}}>{stop.clientName}</span>
{stop.address&&<span className="text-xs text-gray">{stop.address.slice(0,25)}</span>}
<div className="flex gap-1">
{i>0&&<button className="btn btn-outline btn-sm" style={{padding:'2px 6px'}} onClick={()=>moveStop(stop.id,-1)}>{'↑'}</button>}
{i<(form.stops||[]).length-1&&<button className="btn btn-outline btn-sm" style={{padding:'2px 6px'}} onClick={()=>moveStop(stop.id,1)}>{'↓'}</button>}
<button className="btn btn-danger btn-sm" style={{padding:'2px 6px'}} onClick={()=>removeStop(stop.id)}>✕</button>
</div>
</div>))}</div>}
{!(form.stops||[]).length&&<p className="text-sm text-gray">No stops added yet</p>}
</div>
<div className="mt-2"><label className="text-xs font-medium text-gray">Notes</label><textarea value={form.notes||''} onChange={e=>setForm({...form,notes:e.target.value})} rows={2}/></div>
<div className="flex justify-between mt-4"><button className="btn btn-outline" onClick={()=>{setShow(false);setEdit(null)}}>Cancel</button>
<button className="btn btn-primary" onClick={save}>{edit?'Update':'Create'} Route</button></div>
</Modal>
</div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
